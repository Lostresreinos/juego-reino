<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabaseUrl = "https://mqzvblzlazoywekqvkmd.supabase.co";
const supabaseKey = "sb_publishable_8Vci9ZkcMUJFXa6ehz14yw_OIFEb_Ff";

// 👇 AQUÍ ESTÁ EL CAMBIO IMPORTANTE
const cliente = supabase.createClient(supabaseUrl, supabaseKey);

document.getElementById("form-reino").addEventListener("submit", async function(e) {
  e.preventDefault();

  const codigo = document.getElementById("codigo").value;

  const { data, error } = await cliente
    .from("invitaciones")
    .select("*")
    .eq("codigo", codigo)
    .eq("usado", false)
    .single();

  if (error || !data) {
    alert("Ese código no es válido.");
    return;
  }

  await cliente
    .from("invitaciones")
    .update({ usado: true })
    .eq("codigo", codigo);

  alert("Acceso concedido 👑");

  window.location.href = "/juego.html";
});
</script>
