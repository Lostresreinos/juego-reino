<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Acceso al Reino</title>
</head>

<body style="background:black; color:white; text-align:center; font-family:sans-serif;">

  <h1>Acceso al Reino 👑</h1>

  <form id="form-reino">
    <input 
      type="text" 
      id="codigo" 
      placeholder="Ingresa tu código"
      style="padding:10px; font-size:16px;"
    >
    <br><br>
    <button type="submit" style="padding:10px 20px;">
      Entrar
    </button>
  </form>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <script>
  window.onload = function () {

    const supabaseUrl = "https://mqzvblzlazoywekqvkmd.supabase.co";
    const supabaseKey = "sb_publishable_8Vci9ZkcMUJFXa6ehz14yw_OIFEb_Ff";

    const cliente = window.supabase.createClient(supabaseUrl, supabaseKey);

    const form = document.getElementById("form-reino");

    form.addEventListener("submit", async function(e) {
      e.preventDefault();

      const codigo = document.getElementById("codigo").value.trim();

      if (!codigo) {
        alert("Ingresa un código");
        return;
      }

      const { data, error } = await cliente
        .from("invitaciones")
        .select("*")
        .eq("codigo", codigo)
        .eq("usado", false)
        .single();

      if (error || !data) {
        alert("Ese código no es válido");
        return;
      }

      await cliente
        .from("invitaciones")
        .update({ usado: true })
        .eq("codigo", codigo);

      alert("Acceso concedido 👑");
      localStorage.setItem("acceso_valido", "true");

      window.location.href = "https://www.ajetrez.com/juego.html";
    });

  };
  </script>

</body>
</html>
