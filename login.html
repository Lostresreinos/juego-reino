<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login</title>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>

<body style="background:black; color:white; text-align:center; font-family:sans-serif;">

<h1>👑 Acceso al Reino</h1>

<h3>Iniciar sesión</h3>

<input id="email" type="email" placeholder="Email"><br><br>
<input id="password" type="password" placeholder="Password"><br><br>

<button onclick="login()">Entrar</button>

<script>
const supabase = window.supabase.createClient(
  "https://mqzvblzlazoywekqvkmd.supabase.co",
  "sb_publishable_8Vci9ZkcMUJFXa6ehz14yw_OIFEb_Ff"
);

async function login() {

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { data, error } = await supabase.auth.signInWithPassword({
    email,
    password
  });

  if (error) {
    alert(error.message);
    return;
  }

  // 🔥 GUARDAR SESIÓN MANUALMENTE
  localStorage.setItem("user_id", data.user.id);

  alert("Login correcto 👑");

  window.location.href = "https://www.ajetrez.com/juego.html";
}
</script>

</body>
</html>
