<!DOCTYPE html>
<html>
<head>
  <title>LTR Login</title>
</head>
<body>

<h2>Registro / Login</h2>

<input type="email" id="email" placeholder="Email"><br><br>
<input type="password" id="password" placeholder="Password"><br><br>

<button onclick="registrar()">Registrarse</button>
<button onclick="login()">Login</button>

<h3 id="estado">Estado: esperando acción...</h3>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
// 🔹 CONFIGURACIÓN (YA LISTA)
const SUPABASE_URL = "https://mqzvblzla20ywekvqkmd.supabase.co";
const SUPABASE_KEY = "sb_publishable_8Vci9ZkcMUJFXa6ehz14yw_OIFEb_Ff";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// -------- REGISTRO --------
async function registrar() {
  document.getElementById("estado").innerText = "CLICK DETECTADO";

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  document.getElementById("estado").innerText = "Registrando usuario...";

  const { data, error } = await supabase.auth.signUp({
    email: email,
    password: password
  });

  if (error) {
    document.getElementById("estado").innerText = "ERROR: " + error.message;
  } else {
    document.getElementById("estado").innerText = "USUARIO CREADO CORRECTAMENTE";
  }
}

// -------- LOGIN --------
async function login() {
  document.getElementById("estado").innerText = "Intentando login...";

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { data, error } = await supabase.auth.signInWithPassword({
    email: email,
    password: password
  });

  if (error) {
    document.getElementById("estado").innerText = "ERROR LOGIN: " + error.message;
  } else {
    document.getElementById("estado").innerText = "LOGIN EXITOSO";
  }
}
</script>

</body>
</html>
