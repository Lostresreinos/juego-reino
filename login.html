<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Acceso al Reino</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
body {
  background:black;
  color:white;
  text-align:center;
  font-family:sans-serif;
}
input {
  padding:8px;
  margin:5px;
  width:220px;
}
button {
  padding:8px 20px;
  margin-top:10px;
}
</style>
</head>

<body>

<h1>👑 Acceso al Reino</h1>

<!-- 🔹 REGISTRO -->
<h3>Registrarse</h3>

<input id="email_reg" type="email" placeholder="Email"><br>
<input id="password_reg" type="password" placeholder="Password"><br>

<button onclick="registrar()">Crear cuenta</button>

<br><br><br>

<!-- 🔹 LOGIN -->
<h3>Iniciar sesión</h3>

<input id="email_log" type="email" placeholder="Email"><br>
<input id="password_log" type="password" placeholder="Password"><br>

<button onclick="login()">Entrar</button>

<script>
const supabase = window.supabase.createClient(
  "https://mqzvblzlazoywekqvkmd.supabase.co",
  "sb_publishable_8Vci9ZkcMUJFXa6ehz14yw_OIFEb_Ff"
);

// 🔥 REGISTRAR
async function registrar() {

  const email = document.getElementById("email_reg").value;
  const password = document.getElementById("password_reg").value;

  const { data, error } = await supabase.auth.signUp({
    email,
    password
  });

  if (error) {
    alert("ERROR: " + error.message);
    return;
  }

  const user = data.user;

  if (!user) {
    alert("Error creando usuario");
    return;
  }

  // guardar en tabla usuarios
  await supabase.from("usuarios").insert([
    {
      id: user.id,
      email: email
    }
  ]);

  alert("Cuenta creada 👑");
}

// 🔥 LOGIN
async function login() {

  const email = document.getElementById("email_log").value;
  const password = document.getElementById("password_log").value;

  const { data, error } = await supabase.auth.signInWithPassword({
    email,
    password
  });

  if (error) {
    alert("ERROR: " + error.message);
    return;
  }

  // guardar sesión en este dominio
  localStorage.setItem("user_id", data.user.id);

  window.location.href = "https://www.ajetrez.com/juego.html";
}
</script>

</body>
</html>
