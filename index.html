<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>
window.onload = function () {

  const supabaseUrl = "https://mqzvblzlazoywekqvkmd.supabase.co";
  const supabaseKey = "sb_publishable_8Vci9ZkcMUJFXa6ehz14yw_OIFEb_Ff";

  const cliente = window.supabase.createClient(supabaseUrl, supabaseKey);

  const form = document.getElementById("form-reino");

  if (!form) {
    alert("Formulario no encontrado");
    return;
  }

  form.addEventListener("submit", async function(e) {
    e.preventDefault();

    const codigo = document.getElementById("codigo").value;

    const { data, error } = await cliente
      .from("invitaciones")
      .select("*")
      .eq("codigo", codigo)
      .eq("usado", false)
      .single();

    if (error) {
      alert("Error técnico");
      return;
    }

    if (!data) {
      alert("Ese código no es válido");
      return;
    }

    await cliente
      .from("invitaciones")
      .update({ usado: true })
      .eq("codigo", codigo);

    alert("Acceso concedido 👑");

    window.location.href = "/juego.html";
  });

};
</script>
