<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>
window.onload = function () {

  const supabaseUrl = "https://mqzvblzlazoywekqvkmd.supabase.co";
  const supabaseKey = "sb_publishable_8Vci9ZkcMUJFXa6ehz14yw_OIFEb_Ff";

  const cliente = window.supabase.createClient(supabaseUrl, supabaseKey);

  // Busca cualquier formulario en la página
  const form = document.querySelector("form");

  if (!form) {
    alert("No hay formulario en esta página");
    return;
  }

  form.addEventListener("submit", async function(e) {
    e.preventDefault();

    // Busca cualquier input tipo texto (el código)
    const input = document.querySelector("input[type='text']");

    if (!input) {
      alert("No se encontró el campo de código");
      return;
    }

    const codigo = input.value.trim();

    if (!codigo) {
      alert("Ingresa un código");
      return;
    }

    const { data, error } = await cliente
      .from("invitaciones")
      .select("*")
      .eq("codigo", codigo)
      .eq("usado", false)
      .single();

    if (error || !data) {
      alert("Ese código no es válido");
      return;
    }

    await cliente
      .from("invitaciones")
      .update({ usado: true })
      .eq("codigo", codigo);

    alert("Acceso concedido 👑");

    window.location.href = "/juego.html";
  });

};
</script>
